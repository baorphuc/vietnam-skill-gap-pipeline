x-airflow-common: &airflow-common
  build:
    context: ../airflow
    dockerfile: Dockerfile
  image: vsg-airflow:latest
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfd4gA="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # MinIO connection
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    # Kafka connection — dùng tên biến khớp với producers/*.py
    KAFKA_BOOTSTRAP: kafka:9092
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ../producers:/opt/producers
    - ../data:/opt/producers/data
  depends_on:
    airflow-db:
      condition: service_healthy

services:

  # ── Zookeeper ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ──────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"   # host access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168      # 7 days
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka UI (optional — uncomment khi cần debug topic/messages) ──
  # Tắt mặc định để tiết kiệm RAM trên máy 12GB.
  # Bỏ comment cả block này khi cần xem messages trực quan.
  # kafka-ui:
  #   image: provectuslabs/kafka-ui:latest
  #   container_name: kafka-ui
  #   depends_on:
  #     - kafka
  #   ports:
  #     - "8090:8080"
  #   environment:
  #     KAFKA_CLUSTERS_0_NAME: local
  #     KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── MinIO (S3-compatible object storage) ──────────────────
  minio:
    image: minio/minio:RELEASE.2024-03-21T23-13-43Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init ──────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/skillgap;
        mc mb --ignore-existing local/skillgap/bronze/raw_json;
        mc mb --ignore-existing local/skillgap/bronze/parsed_parquet;
        mc mb --ignore-existing local/skillgap/silver;
        mc mb --ignore-existing local/skillgap/gold;
        echo 'MinIO buckets ready';
      "
    restart: on-failure

  # ── Spark Master ───────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.1-python3
    container_name: spark-master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"   # Spark Web UI
      - "7077:7077"   # Spark master port
    volumes:
      - ../spark_jobs:/opt/spark_jobs
      - spark-logs:/opt/spark/logs

  # ── Spark Worker ───────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.1-python3
    container_name: spark-worker
    user: root
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 1
    volumes:
      - ../spark_jobs:/opt/spark_jobs

  # ── Airflow DB ─────────────────────────────────────────────
  airflow-db:
    image: postgres:15
    container_name: airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow Init ───────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: on-failure

  # ── Airflow Webserver ──────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Airflow Scheduler ──────────────────────────────────────
  # user: root + docker.sock mount -> cho phép task BashOperator gọi
  # `docker exec spark-master ...` để trigger Spark jobs từ Airflow
  # (LocalExecutor chạy task ngay trong process của scheduler)
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    user: "0:0"
    command: scheduler
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - ../producers:/opt/producers
      - ../data:/opt/producers/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  minio-data:
  airflow-db-data:
  airflow-logs:
  spark-logs:
